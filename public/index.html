<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quart de Singe 🐒</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ACCUEIL -->

<div id="welcome">

<h1>🐒 Quart de Singe</h1>
<p>Le jeu le plus drôle de la soirée</p>

<button id="btnToGame">Jouer</button>

</div>



<!-- MENU -->

<div id="game" style="display:none;">

<h1>🎮 Lobby</h1>

<input id="playerNameInput" placeholder="Entrez votre prénom">

<br><br>

<button id="btnHostLobby" disabled>Créer un lobby</button>
<button id="btnJoinLobby" disabled>Rejoindre un lobby</button>

<br><br>

<button id="btnBackLobby">Retour</button>

<div id="joinCodeContainer" style="display:none;">
<input id="joinCodeInput" placeholder="Code lobby">
<button id="btnSubmitJoin">Rejoindre</button>
</div>

</div>



<!-- LOBBY -->

<div id="lobby" style="display:none;">

<h1>🎉 Lobby</h1>

<p id="lobbyCodeDisplay"></p>

<div id="lobbyPlayers"></div>

<button id="btnStartGame" disabled>Lancer la partie</button>

<br><br>

<button id="btnBackFromLobby">Retour</button>

</div>



<!-- PARTIE -->

<div id="play" style="display:none;">

<h1>🐒 Partie</h1>

<button id="btnRandomRule">🎲 Règle</button>
<button id="btnReset">🔄 Reset</button>
<button id="btnBack">⬅ Retour</button>

<div id="ruleBox">Aucune règle</div>

<div id="gameTable">

<div id="playersAround"></div>

<div id="mainCard" onclick="addQuart()">

<div id="beerGauge"></div>

<div id="singeCard">🐒</div>

<div id="mainPlayerName"></div>

</div>

</div>

<button id="btnEndGame">🏁 Fin de partie</button>

</div>



<!-- CLASSEMENT -->

<div id="ranking" style="display:none;">

<h1>🏆 Classement final</h1>

<div id="rankingList"></div>

<br>

<button onclick="location.reload()">Retour menu</button>

</div>


<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
